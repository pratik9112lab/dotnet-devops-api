apiVersion: apps/v1
kind: Deployment

metadata:
  name: dotnet-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dotnet-api

  template:
    metadata:
      labels:
        app: dotnet-api
  
    spec:
      containers:
        - name: dotnet-api
          image: pratik909/dotnet-api:v1

          ports:
            - containerPort: 8080

name: .NET CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build

      - name: Docker Build
        run: docker build -t pratik909/dotnet-api:latest .

      - name: Docker Push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{secrets.DOCKER_PASSWORD }}
        docker push pratik909/dotnet-api:latest
      - name: kubernetes Deploy
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment dotnet-api
